<?xml version="1.0" encoding="UTF-8"?>
<svg width="1000" height="700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    EduPulse: College Admission System Workflow
  </text>
  
  <!-- User -->
  <ellipse cx="100" cy="100" rx="60" ry="40" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#1976d2">User/Student</text>
  
  <!-- Landing Page -->
  <rect x="200" y="70" width="120" height="60" fill="#ffffff" stroke="#2196f3" stroke-width="2" rx="5"/>
  <text x="260" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Landing Page</text>
  <text x="260" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">(index.html)</text>
  
  <!-- Navigation Options -->
  <rect x="370" y="70" width="120" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="430" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Navigation</text>
  <text x="430" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">• Departments</text>
  <text x="430" y="118" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">• Achievements</text>
  
  <!-- Application Form -->
  <rect x="540" y="70" width="120" height="60" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Application</text>
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Form (apply.html)</text>
  
  <!-- Form Validation -->
  <rect x="710" y="70" width="120" height="60" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
  <text x="770" y="90" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Client Side</text>
  <text x="770" y="105" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Validation</text>
  <text x="770" y="118" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">(JavaScript)</text>
  
  <!-- API Call -->
  <rect x="880" y="70" width="100" height="60" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="930" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">API Call</text>
  <text x="930" y="110" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">POST /api/</text>
  <text x="930" y="123" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">applications</text>
  
  <!-- Controller -->
  <rect x="880" y="180" width="100" height="60" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="930" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Controller</text>
  <text x="930" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">StudentApp</text>
  <text x="930" y="228" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Controller</text>
  
  <!-- Service Layer -->
  <rect x="710" y="180" width="120" height="60" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="770" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Service Layer</text>
  <text x="770" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Business Logic</text>
  <text x="770" y="228" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Validation</text>
  
  <!-- Repository -->
  <rect x="540" y="180" width="120" height="60" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Repository</text>
  <text x="600" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Data Access</text>
  <text x="600" y="228" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">JPA Operations</text>
  
  <!-- Database -->
  <rect x="370" y="180" width="120" height="60" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="430" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">MySQL</text>
  <text x="430" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Database</text>
  <text x="430" y="228" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Storage</text>
  
  <!-- Success Response -->
  <rect x="200" y="180" width="120" height="60" fill="#e0f2f1" stroke="#009688" stroke-width="2" rx="5"/>
  <text x="260" y="200" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Success</text>
  <text x="260" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Response</text>
  <text x="260" y="228" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Confirmation</text>
  
  <!-- Admin View -->
  <rect x="100" y="290" width="120" height="60" fill="#fce4ec" stroke="#e91e63" stroke-width="2" rx="5"/>
  <text x="160" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Admin Portal</text>
  <text x="160" y="325" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">View Applications</text>
  <text x="160" y="338" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Manage Data</text>
  
  <!-- Data Processing -->
  <rect x="280" y="290" width="120" height="60" fill="#f1f8e9" stroke="#689f38" stroke-width="2" rx="5"/>
  <text x="340" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Data Processing</text>
  <text x="340" y="325" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Analysis</text>
  <text x="340" y="338" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Reports</text>
  
  <!-- Error Handling -->
  <rect x="460" y="290" width="120" height="60" fill="#ffebee" stroke="#f44336" stroke-width="2" rx="5"/>
  <text x="520" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Error Handling</text>
  <text x="520" y="325" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Validation Errors</text>
  <text x="520" y="338" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Exception Handling</text>
  
  <!-- Feedback Loop -->
  <rect x="640" y="290" width="120" height="60" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2" rx="5"/>
  <text x="700" y="310" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">User Feedback</text>
  <text x="700" y="325" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Notifications</text>
  <text x="700" y="338" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Status Updates</text>
  
  <!-- Decision Diamond -->
  <polygon points="430,400 480,450 430,500 380,450" fill="#fff9c4" stroke="#f9a825" stroke-width="2"/>
  <text x="430" y="450" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#333">Valid?</text>
  
  <!-- Success Path -->
  <rect x="200" y="420" width="100" height="50" fill="#c8e6c9" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="250" y="440" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Save Data</text>
  <text x="250" y="455" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Success</text>
  
  <!-- Error Path -->
  <rect x="560" y="420" width="100" height="50" fill="#ffcdd2" stroke="#f44336" stroke-width="2" rx="5"/>
  <text x="610" y="440" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Return Error</text>
  <text x="610" y="455" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Retry</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Main flow arrows -->
  <line x1="160" y1="100" x2="200" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="320" y1="100" x2="370" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="490" y1="100" x2="540" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="660" y1="100" x2="710" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="830" y1="100" x2="880" y2="100" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Backend flow -->
  <line x1="930" y1="130" x2="930" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="880" y1="210" x2="830" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="710" y1="210" x2="660" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="540" y1="210" x2="490" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Database and response -->
  <line x1="370" y1="210" x2="320" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision flow -->
  <line x1="430" y1="240" x2="430" y2="400" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="380" y1="450" x2="300" y2="445" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="450" x2="560" y2="445" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Additional processes -->
  <line x1="160" y1="240" x2="160" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="250" y1="470" x2="250" y2="520" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="610" y1="470" x2="610" y2="520" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Process labels -->
  <text x="250" y="520" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#4caf50">Application Submitted</text>
  <text x="610" y="520" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#f44336">Error Message</text>
</svg>
