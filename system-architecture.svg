<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="600" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    EduPulse: College Informative System - Architecture
  </text>
  
  <!-- Client Layer -->
  <rect x="50" y="60" width="800" height="120" fill="#e8f4fd" stroke="#2196f3" stroke-width="2" rx="5"/>
  <text x="450" y="85" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1976d2">
    Client Layer (Frontend)
  </text>
  
  <!-- Client Components -->
  <rect x="80" y="100" width="150" height="60" fill="#ffffff" stroke="#2196f3" stroke-width="1" rx="3"/>
  <text x="155" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">HTML5</text>
  <text x="155" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Structure &amp; Content</text>
  
  <rect x="250" y="100" width="150" height="60" fill="#ffffff" stroke="#2196f3" stroke-width="1" rx="3"/>
  <text x="325" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">CSS3</text>
  <text x="325" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Styling &amp; Design</text>
  
  <rect x="420" y="100" width="150" height="60" fill="#ffffff" stroke="#2196f3" stroke-width="1" rx="3"/>
  <text x="495" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">JavaScript</text>
  <text x="495" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Client Logic</text>
  
  <rect x="590" y="100" width="150" height="60" fill="#ffffff" stroke="#2196f3" stroke-width="1" rx="3"/>
  <text x="665" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333">Responsive UI</text>
  <text x="665" y="140" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Mobile-First</text>
  
  <!-- API Gateway -->
  <rect x="200" y="210" width="500" height="50" fill="#fff3e0" stroke="#ff9800" stroke-width="2" rx="5"/>
  <text x="450" y="240" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#f57c00">
    RESTful API Gateway
  </text>
  
  <!-- Backend Layer -->
  <rect x="50" y="290" width="800" height="150" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" rx="5"/>
  <text x="450" y="315" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#7b1fa2">
    Backend Layer (Spring Boot)
  </text>
  
  <!-- Backend Components -->
  <rect x="80" y="330" width="180" height="90" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
  <text x="170" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Controller Layer</text>
  <text x="170" y="370" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">StudentApplicationController</text>
  <text x="170" y="385" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">REST Endpoints</text>
  <text x="170" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">CORS Support</text>
  
  <rect x="280" y="330" width="180" height="90" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
  <text x="370" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Service Layer</text>
  <text x="370" y="370" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">StudentApplicationService</text>
  <text x="370" y="385" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Business Logic</text>
  <text x="370" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Data Validation</text>
  
  <rect x="480" y="330" width="180" height="90" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
  <text x="570" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Repository Layer</text>
  <text x="570" y="370" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">StudentApplicationRepository</text>
  <text x="570" y="385" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Data Access</text>
  <text x="570" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">CRUD Operations</text>
  
  <rect x="680" y="330" width="150" height="90" fill="#ffffff" stroke="#9c27b0" stroke-width="1" rx="3"/>
  <text x="755" y="355" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Entity Layer</text>
  <text x="755" y="370" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">StudentApplication</text>
  <text x="755" y="385" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">JPA Annotations</text>
  <text x="755" y="400" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Data Model</text>
  
  <!-- Database Layer -->
  <rect x="50" y="470" width="800" height="100" fill="#e8f5e8" stroke="#4caf50" stroke-width="2" rx="5"/>
  <text x="450" y="495" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#388e3c">
    Database Layer
  </text>
  
  <!-- Database Components -->
  <rect x="200" y="510" width="200" height="45" fill="#ffffff" stroke="#4caf50" stroke-width="1" rx="3"/>
  <text x="300" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">MySQL 8.0</text>
  <text x="300" y="545" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Relational Database</text>
  
  <rect x="420" y="510" width="200" height="45" fill="#ffffff" stroke="#4caf50" stroke-width="1" rx="3"/>
  <text x="520" y="530" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Hibernate ORM</text>
  <text x="520" y="545" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#666">Object-Relational Mapping</text>
  
  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Client to API -->
  <line x1="450" y1="180" x2="450" y2="210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- API to Backend -->
  <line x1="450" y1="260" x2="450" y2="290" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Backend to Database -->
  <line x1="450" y1="440" x2="450" y2="470" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Side annotations -->
  <text x="30" y="120" font-family="Arial, sans-serif" font-size="10" fill="#666" transform="rotate(-90 30 120)">Presentation</text>
  <text x="30" y="365" font-family="Arial, sans-serif" font-size="10" fill="#666" transform="rotate(-90 30 365)">Business Logic</text>
  <text x="30" y="520" font-family="Arial, sans-serif" font-size="10" fill="#666" transform="rotate(-90 30 520)">Data Storage</text>
</svg>
